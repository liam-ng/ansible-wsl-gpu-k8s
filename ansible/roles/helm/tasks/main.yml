---
- name: Check installed Helm version
  ansible.builtin.command: helm version --short
  register: helm_installed_version
  changed_when: false
  failed_when: false

- name: Download Helm archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-{{ sys_arch }}.tar.gz"
    dest: "/tmp/helm-v{{ helm_version }}-linux-{{ sys_arch }}.tar.gz"
    mode: "0644"
  when: helm_installed_version.rc != 0 or helm_version not in helm_installed_version.stdout

- name: Extract Helm binary
  ansible.builtin.unarchive:
    src: "/tmp/helm-v{{ helm_version }}-linux-{{ sys_arch }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/linux-{{ sys_arch }}/helm"
  when: helm_installed_version.rc != 0 or helm_version not in helm_installed_version.stdout

- name: Install Helm binary
  ansible.builtin.copy:
    src: "/tmp/linux-{{ sys_arch }}/helm"
    dest: "{{ helm_install_dir }}/helm"
    mode: "0755"
    remote_src: true
  when: helm_installed_version.rc != 0 or helm_version not in helm_installed_version.stdout
