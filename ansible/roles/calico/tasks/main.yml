---
- name: Set Calico Helm parameters
  ansible.builtin.set_fact:
    calico_release_name: calico
    calico_namespace: calico-system
    calico_values_file: "{{ helm_values_dir }}/helm-calico{{ '-arm64' if sys_arch == 'arm64' else '' }}.yaml"

- name: Add Calico Helm repository
  ansible.builtin.command: helm repo add projectcalico https://docs.tigera.io/calico/charts
  environment:
    KUBECONFIG: "{{ kubeconfig_user_home }}/.kube/config"
  register: calico_repo_add
  changed_when: "'has been added' in calico_repo_add.stdout"
  failed_when: calico_repo_add.rc != 0 and 'already exists' not in calico_repo_add.stderr

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: "{{ kubeconfig_user_home }}/.kube/config"
  changed_when: false

- name: Install Calico via Helm
  ansible.builtin.command: >-
    helm upgrade --install {{ calico_release_name }} projectcalico/tigera-operator
    --namespace {{ calico_namespace }}
    --create-namespace
    --version {{ calico_version }}
    -f {{ calico_values_file }}
    --set installation.calicoNetwork.ipPools[0].cidr={{ pod_network_cidr }}
  environment:
    KUBECONFIG: "{{ kubeconfig_user_home }}/.kube/config"

- name: Wait for Calico pods to be ready
  ansible.builtin.command: kubectl wait --for=condition=Ready pods --all -n {{ calico_namespace }} --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig_user_home }}/.kube/config"
  changed_when: false
  failed_when: false
