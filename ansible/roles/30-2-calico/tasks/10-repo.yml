---
- name: Add Calico Helm repository
  ansible.builtin.command: helm repo add {{ calico_repo_name }} {{ calico_repo_url }}
  environment:
    KUBECONFIG: "{{ calico_kubeconfig_path }}"
  register: calico_repo_add
  changed_when: "'has been added' in calico_repo_add.stdout"
  failed_when: calico_repo_add.rc != 0 and 'already exists' not in calico_repo_add.stderr

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: "{{ calico_kubeconfig_path }}"
  changed_when: false
