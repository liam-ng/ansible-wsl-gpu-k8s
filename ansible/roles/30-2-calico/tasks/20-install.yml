---
- name: 20-install - Install Calico via Helm
  ansible.builtin.command: >-
    helm upgrade --install {{ calico_release_name }} {{ calico_chart_ref }}
    --namespace {{ calico_namespace }}
    --create-namespace
    --version {{ calico_version }}
    -f {{ calico_values_file }}
    --set installation.calicoNetwork.ipPools[0].cidr={{ pod_network_cidr }}
  environment:
    KUBECONFIG: "{{ calico_kubeconfig_path }}"
