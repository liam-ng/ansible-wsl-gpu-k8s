---
- name: 40-kubeconfig - Create kubeconfig directory for user
  ansible.builtin.file:
    path: "{{ kubeconfig_user_home }}/.kube"
    state: directory
    mode: "0700"
    owner: "{{ kubeconfig_user }}"
    group: "{{ kubeconfig_user }}"

- name: 40-kubeconfig - Copy admin kubeconfig to user home
  ansible.builtin.copy:
    src: "{{ kubernetes_admin_conf }}"
    dest: "{{ kubeconfig_path }}"
    remote_src: true
    mode: "0600"
    owner: "{{ kubeconfig_user }}"
    group: "{{ kubeconfig_user }}"
