---
- name: 10-repo - Create apt keyrings directory
  ansible.builtin.file:
    path: "{{ kubernetes_apt_keyring_dir }}"
    state: directory
    mode: "0755"

- name: 10-repo - Add Kubernetes apt repository key
  ansible.builtin.get_url:
    url: "{{ kubernetes_apt_key_url }}"
    dest: "{{ kubernetes_apt_key_path }}"
    mode: "0644"

- name: 10-repo - Configure Kubernetes apt repository
  ansible.builtin.copy:
    dest: "{{ kubernetes_apt_sources_list }}"
    content: |
      {{ kubernetes_apt_repository }}
    mode: "0644"

- name: 10-repo - Update apt cache
  ansible.builtin.apt:
    update_cache: true
