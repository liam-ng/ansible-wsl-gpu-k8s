---
- name: 30-config - Create containerd configuration directory
  ansible.builtin.file:
    path: "{{ containerd_config_dir }}"
    state: directory
    mode: "0755"

- name: 30-config - Configure containerd
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ containerd_config_path }}"
    mode: "0644"
  notify: Restart containerd

- name: 30-config - Enable and start containerd
  ansible.builtin.systemd:
    name: "{{ containerd_service_name }}"
    enabled: true
    state: started
