---
# ../tasks/10-install.yml
helm_install_dir: /usr/local/bin
helm_archive_name: "helm-v{{ helm_version }}-linux-{{ sys_arch }}.tar.gz"
helm_archive_url: "https://get.helm.sh/{{ helm_archive_name }}"
helm_archive_path: "/tmp/{{ helm_archive_name }}"
helm_extract_dir: "/tmp/linux-{{ sys_arch }}"
helm_binary_path: "{{ helm_install_dir }}/helm"
