---
- name: 10-install - Check installed Helm version
  ansible.builtin.command: helm version --short
  register: helm_installed_version
  changed_when: false
  failed_when: false

- name: 10-install - Download Helm archive
  ansible.builtin.get_url:
    url: "{{ helm_archive_url }}"
    dest: "{{ helm_archive_path }}"
    mode: "0644"
  when: helm_installed_version.rc != 0 or helm_version not in helm_installed_version.stdout

- name: 10-install - Extract Helm binary
  ansible.builtin.unarchive:
    src: "{{ helm_archive_path }}"
    dest: /tmp
    remote_src: true
    creates: "{{ helm_extract_dir }}/helm"
  when: helm_installed_version.rc != 0 or helm_version not in helm_installed_version.stdout

- name: 10-install - Install Helm binary
  ansible.builtin.copy:
    src: "{{ helm_extract_dir }}/helm"
    dest: "{{ helm_binary_path }}"
    mode: "0755"
    remote_src: true
  when: helm_installed_version.rc != 0 or helm_version not in helm_installed_version.stdout
