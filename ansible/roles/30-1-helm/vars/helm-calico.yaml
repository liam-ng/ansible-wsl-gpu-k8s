# Calico (tigera-operator) for x86/amd64 WSL. Release: calico, namespace: calico-system
#
#   helm upgrade -i calico projectcalico/tigera-operator \
#     -n calico-system \
#     --create-namespace \
#     -f helm/helm-calico.yaml

installation:
  kubernetesProvider: Linux
  calicoNetwork:
    ipPools:
      # cidr is set at install time from pod_network_cidr (versions.yml)
      - encapsulation: VXLANCrossSubnet
        blockSize: 24
