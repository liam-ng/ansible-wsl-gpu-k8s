# There are 2 deployments for desktop x86 and Jetson arm64.
# helm upgrade -i nvdp nvdp/nvidia-device-plugin \
#   -n nvidia-device-plugin \
#   --set nodeSelector."kubernetes\.io/arch"=amd64

# helm upgrade -i nvdp-arm64 nvdp/nvidia-device-plugin \
#   --namespace nvidia-device-plugin \
#   -f helm/helm-nvidia-device-plugin-arm64.yaml

nodeSelector:
  kubernetes.io/arch: arm64
  # hostname is set at install time via --set to match ansible_hostname

failOnInitError: false
deviceDiscoveryStrategy: tegra

extraVolumes:
  - name: tegra-release
    hostPath:
      path: /etc/nv_tegra_release
      type: FileOrCreate
  - name: tegra-libs
    hostPath:
      path: /usr/lib/aarch64-linux-gnu/nvidia
      type: Directory

extraVolumeMounts:
  - name: tegra-release
    mountPath: /etc/nv_tegra_release
    readOnly: true
  - name: tegra-libs
    mountPath: /usr/lib/aarch64-linux-gnu/nvidia
    readOnly: true