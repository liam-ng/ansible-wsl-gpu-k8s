---
# Map Ansible CPU facts to Debian/apt architecture names (amd64, arm64).
sys_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_architecture, ansible_architecture) }}"

single_node_cluster: true

kubeconfig_user: "{{ ansible_env.USER | default('root') }}"
kubeconfig_user_home: "{{ ansible_env.HOME | default('/root') }}"

pod_network_cidr: "192.168.0.0/16"